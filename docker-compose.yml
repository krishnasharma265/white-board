services:

  backend:

    build: .

    container_name: white_board_backend
    ports:
      - "8000:8000"
    
    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - redis
      - db


  redis:

    image: redis:7

    container_name: whiteboard_redis

    ports:
      - "6380:6379"


  db:

    image: postgres:17

    container_name: whiteboard

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: RANGEROVER
      POSTGRES_DB: whiteboard

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data



volumes:

  postgres_data: